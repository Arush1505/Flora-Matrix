<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantMD | Main Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/dashboard" class="brand">🌿 PlantMD</a>
        <div class="nav-links">
            <a href="/dashboard" class="active">Dashboard</a>
            <a href="/remedies">Remedies</a>
            <button class="btn-logout" onclick="logout()">Logout ({{ username }})</button>
        </div>
    </nav>

    <div class="container">
        <div class="hero glass">
            <h1>Plant Disease Predictor</h1>
            <p>Upload a clear photo of a plant leaf to get an instant diagnosis</p>
        </div>

        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <span class="upload-icon">📷</span>
            <p>Click to browse or Drag & Drop image here</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="spinner" id="loadingSpinner"></div>

        <div class="result-section" id="resultSection">
            <div class="image-preview glass">
                <img id="uploadedImage" src="" alt="Uploaded Leaf">
            </div>
            
            <div class="prediction-details">
                <div class="stat-card glass">
                    <div class="stat-label">Diagnosis Result</div>
                    <div class="stat-value" id="diseaseName">--</div>
                    
                    <div style="margin-top: 1.5rem;">
                        <div class="stat-label">Confidence Score: <span id="confidenceText">--%</span></div>
                        <div class="confidence-bar">
                            <div class="fill" id="confidenceBar"></div>
                        </div>
                    </div>
                </div>

                <div class="stat-card glass" id="remedyPreview" style="display: none;">
                    <div class="stat-label">Recommended Strategy</div>
                    <h3 id="remedyTitle" style="margin-bottom: 0.5rem; color: #fff;">--</h3>
                    <p id="remedyDesc" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.5;">--</p>
                    <button class="btn-primary" style="margin-top: 1rem;" onclick="window.location.href='/remedies'">View Full Remedies Guide</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
