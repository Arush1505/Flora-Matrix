<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Matrix | Authentication</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="brand">🌿 Flora Matrix</a>
    </nav>
    
    <div class="auth-container">
        <!-- Sign In Form -->
        <div class="auth-box glass" id="signInBox">
            <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <button type="button" id="tab-user" style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--accent); background-color: var(--accent); color: white; cursor: pointer; font-weight: bold;" onclick="setLoginType('user')">User</button>
                <button type="button" id="tab-admin" style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--accent); background-color: transparent; color: var(--text); cursor: pointer; font-weight: bold;" onclick="setLoginType('admin')">Admin</button>
            </div>
            <h2 id="loginTitle">User Login</h2>
            <p id="loginSubtitle">Login to your account to continue</p>
            <form id="signInForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="si-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="si-password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <div class="auth-switch">
                Don't have an account? <span onclick="toggleAuth('signup')">Sign Up</span>
            </div>
        </div>

        <!-- Sign Up Form -->
        <div class="auth-box glass" id="signUpBox" style="display: none;">
            <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <button type="button" id="tab-su-user" style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--accent); background-color: var(--accent); color: white; cursor: pointer; font-weight: bold;" onclick="setSignupType('user')">User</button>
                <button type="button" id="tab-su-admin" style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--accent); background-color: transparent; color: var(--text); cursor: pointer; font-weight: bold;" onclick="setSignupType('admin')">Admin</button>
            </div>
            <h2 id="signupTitle">Create Account</h2>
            <p id="signupSubtitle">Join Flora Matrix today</p>
            <form id="signUpForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="su-username" required>
                </div>
                <div class="form-group" id="su-email-group" style="display: none;">
                    <label>Your Email (for Admin Approval)</label>
                    <input type="email" id="su-email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="su-password" required>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <div class="auth-switch">
                Already have an account? <span onclick="toggleAuth('signin')">Sign In</span>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
