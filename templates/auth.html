<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantMD | Authentication</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="brand">🌿 PlantMD</a>
    </nav>
    
    <div class="auth-container">
        <!-- Sign In Form -->
        <div class="auth-box glass" id="signInBox">
            <h2>Welcome Back</h2>
            <p>Login to your account to continue</p>
            <form id="signInForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="si-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="si-password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <div class="auth-switch">
                Don't have an account? <span onclick="toggleAuth('signup')">Sign Up</span>
            </div>
        </div>

        <!-- Sign Up Form -->
        <div class="auth-box glass" id="signUpBox" style="display: none;">
            <h2>Create Account</h2>
            <p>Join PlantMD today</p>
            <form id="signUpForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="su-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="su-password" required>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <div class="auth-switch">
                Already have an account? <span onclick="toggleAuth('signin')">Sign In</span>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
