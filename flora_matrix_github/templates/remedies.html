<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantMD | Remedies Guide</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/dashboard" class="brand">🌿 PlantMD</a>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/remedies" class="active">Remedies</a>
            <button class="btn-logout" onclick="logout()">Logout ({{ username }})</button>
        </div>
    </nav>

    <div class="container">
        <div class="hero glass">
            <h1>Remedies Library</h1>
            <p>Search and explore treatments for various plant diseases</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search by crop or disease name...">
        </div>

        <div class="spinner" id="remediesSpinner"></div>

        <div class="remedies-grid" id="remediesContainer">
            <!-- Cards appended here via JS -->
        </div>
    </div>

    <div id="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Trigger data load on this specific page
        document.addEventListener('DOMContentLoaded', fetchRemedies);
    </script>
</body>
</html>
